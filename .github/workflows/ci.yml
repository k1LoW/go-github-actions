name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  job-test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          fail_level: warning
          go_version_file: go.mod

      - name: Run tests ( upload contents )
        uses: ./testdata/

      - name: Test TestUpload (1/2)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: TestUpload

      - name: Test TestUpload (2/2)
        run: cat artifact/testdata/test.txt

      - name: Test TestUploadLargeContent (1/2)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: TestUploadLargeContent

      - name: Test TestUploadLargeContent (2/2)
        uses: k1LoW/github-script-ruby@3125c9282eb2241d3fb929bfe1d5b9a3a9255513 # v2.6.2
        with:
          script: |
            File.open('artifact/testdata/large.txt') do |f|
              f.each_line do |line|
                unless line.match?(/^0123456789/)
                  puts line
                  exit 1
                end
              end
              unless f.lineno == 1024 * 1024 * 10
                puts f.lineno
                exit 1
              end
            end

      - name: Test TestUploadFiles (1/3)
        run: rm artifact/testdata/test2.txt artifact/testdata/test3.txt

      - name: Test TestUploadFiles (2/3)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: TestUploadFiles

      - name: Test TestUploadFiles (3/3)
        run: cat artifact/testdata/test2.txt artifact/testdata/test3.txt

      - name: Cleanup artifacts
        uses: glassechidna/artifact-cleaner@master
        with:
          minimumAge: 3600

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
